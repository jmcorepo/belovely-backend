services:
  - type: web
    name: belovely-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /healthz
    # Persistent disk so generated songs + the SQLite DB survive deploys/restarts.
    # (Single-instance + brief deploy downtime is fine at launch volume; move to
    # S3/R2 + Postgres when scaling.) App writes everything under /data.
    disk:
      name: belovely-data
      mountPath: /data
      sizeGB: 5
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: "Belovely <hello@belovelygifts.com>"
      - key: SHOPIFY_WEBHOOK_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://belovely-bha00qq3.myshopify.com,https://belovelygifts.com"
      - key: PUBLIC_BASE_URL
        sync: false
